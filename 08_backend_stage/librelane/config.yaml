CLOCK_PERIOD: 60.0
CLOCK_PORT: clk_i
ERROR_ON_LINTER_ERRORS: false    # [expires: v4-complete] Waived: 0 current errors; legacy RTL WIDTHEXPAND/WIDTHTRUNC
ERROR_ON_LINTER_WARNINGS: false  # [expires: v4-complete] Waived: Verilator warnings in legacy IP RTL (WIDTHEXPAND, WIDTHTRUNC, UNOPTFLAT, CASEOVERLAP, TIMESCALEMOD, UNUSEDSIGNAL, PINMISSING, PINCONNECTEMPTY)
ERROR_ON_SYNTH_CHECKS: false   # Waived: 3 RTL slaves (irq_ctrl, caravel_wrapper, clk_rst_mgr) lack wb_err_o port.
                              # drone_soc connects .wb_err_o() for all 15 slaves but these 3 modules don't implement it.
                              # sram_8kb blackbox wb_err_o fixed in v4 (PD domain). Remaining 3 are RTL fixes.
                              # Non-blocking: wb_err is optional in Wishbone B4 spec.
                              # [expires: v4-run3 — fix RTL or add waiver permanent]
ERROR_ON_DISCONNECTED_PINS: false # [expires: v4-complete] Waived: SRAM blackbox has no VDD/VSS pins — handled by macro wrapper
IGNORE_DISCONNECTED_MODULES:
  - sram_8kb
MACRO_PLACEMENT_CFG: ~/hermes_workspace/projects/IP-010/v4/08_backend_stage/librelane/macro_placement.cfg

# SRAM macro files — dummy LEF/GDS with MACRO name sram_8kb matching blackbox module
# Copied from v3 proven configuration
EXTRA_LEFS:
  - ~/hermes_workspace/projects/IP-010/v4/08_backend_stage/macros/sram_8kb/sram_8kb.lef
EXTRA_GDS:
  - ~/hermes_workspace/projects/IP-010/v4/08_backend_stage/macros/sram_8kb/sram_8kb.gds

# PDK-specific overrides
pdk::sky130*:
  FP_CORE_UTIL: 35
  CLOCK_PERIOD: 60.0

# Antenna repair — v3-proven: heuristic diode insertion fixes the persistent net1140 violator
# (met3, ratio 601.86/400.00=1.50) that survives basic repair
RUN_HEURISTIC_DIODE_INSERTION: true
HEURISTIC_ANTENNA_THRESHOLD: 60
GRT_ANTENNA_REPAIR_MARGIN: 20
DRT_ANTENNA_REPAIR_MARGIN: 20
DIODE_PADDING: 2
